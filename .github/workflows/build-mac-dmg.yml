name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci
        env:
          # 🚀 关键：跳过二进制下载 + 提供 GitHub Token 解除 API 限流
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS app (Universal)
        run: npm run gulp vscode-darwin-universal
        env:
          # 🚀 关键：跳过不必要的下载，避免 403
          VSCODE_SKIP_CREDENTIALS: 1
          VSCODE_SKIP_ASSETS: 1

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package DMG
        run: |
          create-dmg \
            --volname "VS Code OSS" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VS Code OSS.app" 150 180 \
            --hide-extension "VS Code OSS.app" \
            --app-drop-link 450 180 \
            "VSCode-OSS.dmg" \
            ".build/darwin/universal/"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: VSCode-OSS-DMG
          path: "*.dmg"
